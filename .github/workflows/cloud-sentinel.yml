name: Cloud Sentinel

# Macが閉じていても・どのアプリが起動してなくても動く"外出時の朝夜の番人"。
# 役割: (1)トークン期限とクラウド自動化の生存確認。顧客データ書き込みは一切しない(read-only + ntfy)。
#       (2)自己修復: schedule休眠や課金ブロック復帰後に古くなった投稿workflowをworkflow_dispatchで起こす。
#          watchdog自身がschedule依存で一緒に休眠しても、この番人(2回/日・確実に稼働)が最後の砦になる。
# 毎朝08:00 JST / 毎夜20:00 JST に、成功時も「✅要点」、異常時は「🚨」をntfyでスマホへ送る。
# 異常時はworkflow自体もfailさせGitHubメール通知も飛ばす。

on:
  schedule:
    - cron: "0 23 * * *" # 08:00 JST = 朝の番人
    - cron: "0 11 * * *" # 20:00 JST = 夜の番人
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: "Set 'yes' to test the alert path"
        required: false
        default: "no"

permissions:
  actions: write # 自己修復で古い投稿workflowをworkflow_dispatch/re-enableするため(read→write)
  contents: read

concurrency:
  group: cloud-sentinel
  cancel-in-progress: false

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout # 自己修復stepが scripts/dispatch_workflow_if_stale.py を使うため
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # X生存確認用: Sheets読取(read-only)のためservice accountを書き出す。
      # auto-post-all.yml の auth書き出しパターンに合わせる(secretのインライン展開禁止・env経由)。
      - name: Write service account credentials for X check (read-only)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p auth
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > auth/service_account.json
          fi
          pip install --quiet google-auth

      - name: Run checks
        id: checks
        env:
          IG_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          THREADS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          DASHBOARD_BASIC_AUTH: ${{ secrets.DASHBOARD_BASIC_AUTH }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SIMULATE_FAILURE: ${{ github.event.inputs.simulate_failure || 'no' }}
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          problems = []
          notes = []
          now = time.time()

          def get_json(url, headers=None):
              req = urllib.request.Request(url, headers={"User-Agent": "cloud-sentinel", **(headers or {})})
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode())

          # 1) Instagram token: validity + expiry + data access (debug_token)
          try:
              app_token = f"{os.environ['META_APP_ID']}|{os.environ['META_APP_SECRET']}"
              q = urllib.parse.urlencode({"input_token": os.environ["IG_TOKEN"], "access_token": app_token})
              data = get_json(f"https://graph.facebook.com/v23.0/debug_token?{q}")["data"]
              if not data.get("is_valid", False):
                  problems.append("IGトークンが無効 (is_valid=false)")
              exp = data.get("expires_at") or 0
              if exp:
                  days = (exp - now) / 86400
                  notes.append(f"IG token残{days:.0f}日")
                  if days < 10:
                      problems.append(f"IGトークン残{days:.0f}日 — Refresh Instagram Token workflowを確認")
              dae = data.get("data_access_expires_at") or 0
              if dae:
                  days = (dae - now) / 86400
                  d = datetime.datetime.fromtimestamp(dae, datetime.timezone.utc).date()
                  notes.append(f"data access残{days:.0f}日({d})")
                  if days < 14:
                      problems.append(f"IG data access残{days:.0f}日 (期限 {d}) — タッキーの再認証が必要")
          except Exception as exc:
              problems.append(f"IG token確認に失敗: {type(exc).__name__}")

          # 2) Threads token validity
          try:
              q = urllib.parse.urlencode({"fields": "id", "access_token": os.environ["THREADS_TOKEN"]})
              get_json(f"https://graph.threads.net/v1.0/me?{q}")
              notes.append("Threads有効")
          except Exception as exc:
              problems.append(f"Threadsトークン無効の可能性: {type(exc).__name__} — Refresh Threads Token workflowを確認")

          # 2.5) X投稿の生存確認 (Sheets読取のみ・read-only。書き込みは一切しない)
          #   - 直近posted行のエラー列に '[auth]' があれば認証失効として警告
          #   - 直近24hにpostedが1件もなければ停止の可能性として警告
          #   ステータス列/エラー列/日付/時刻はヘッダー行1-3から名前検出(列番号ハードコード禁止)
          try:
              sa_path = "auth/service_account.json"
              if not (os.path.exists(sa_path) and os.path.getsize(sa_path) > 0):
                  notes.append("X生存確認: service accountなし→skip")
              else:
                  from google.auth.transport.requests import Request as _GARequest
                  from google.oauth2 import service_account as _ga_sa
                  _creds = _ga_sa.Credentials.from_service_account_file(
                      sa_path, scopes=["https://www.googleapis.com/auth/spreadsheets.readonly"]
                  )
                  _creds.refresh(_GARequest())
                  x_sheet_id = "1rHnDoMHUK_K0_f7MLxHltiU6Y2ATsz3ztKwdf2Zg8Hc"
                  rng = urllib.parse.quote("'X投稿毎データ'!A1:R500", safe="")
                  vals = get_json(
                      f"https://sheets.googleapis.com/v4/spreadsheets/{x_sheet_id}/values/{rng}",
                      {"Authorization": f"Bearer {_creds.token}"},
                  ).get("values", [])
                  headers_rows = vals[:3]
                  data_rows = vals[3:]  # A4以降

                  def find_col(*keywords):
                      for hrow in headers_rows:
                          for idx, cell in enumerate(hrow):
                              c = str(cell)
                              if any(k in c for k in keywords):
                                  return idx
                      return None

                  col_status = find_col("ステータス", "status")
                  col_error = find_col("エラー", "error")
                  col_date = find_col("日付")
                  col_time = find_col("時刻", "時間")

                  def cell(row, idx):
                      return str(row[idx]).strip() if idx is not None and idx < len(row) else ""

                  if col_status is None:
                      problems.append("Xシート: ステータス列をヘッダー行1-3から検出できず — 列名変更の可能性")
                  else:
                      posted_rows = [r for r in data_rows if "posted" in cell(r, col_status).lower()]
                      notes.append(f"X posted累計{len(posted_rows)}件")
                      # (a) 直近posted行のエラー列に [auth]
                      if col_error is not None:
                          auth_hits = [
                              r for r in posted_rows[-10:] if "[auth]" in cell(r, col_error).lower()
                          ]
                          if auth_hits:
                              problems.append(
                                  f"X: 直近posted行{len(auth_hits)}件のエラー列に[auth] — Cookie/認証失効の可能性"
                              )
                      # (b) 直近24hにpostedゼロ
                      if col_date is not None:
                          jst = datetime.timezone(datetime.timedelta(hours=9))
                          now_jst = datetime.datetime.now(jst)
                          recent = 0
                          for r in posted_rows:
                              dv = cell(r, col_date)
                              try:
                                  if "-" in dv:  # ISO形式 2026-07-10 (Xシートの実形式)
                                      y, m, d = dv.split("-")[:3]
                                      dt = datetime.datetime(int(y), int(m), int(d), tzinfo=jst)
                                  else:  # 7/10 or 7月10日
                                      m, d = dv.replace("月", "/").replace("日", "").split("/")[:2]
                                      dt = datetime.datetime(now_jst.year, int(m), int(d), tzinfo=jst)
                                      if dt > now_jst + datetime.timedelta(days=2):
                                          dt = dt.replace(year=now_jst.year - 1)  # 年跨ぎ補正
                                  tv = cell(r, col_time)
                                  if ":" in tv:
                                      hh, mm = tv.split(":")[:2]
                                      dt = dt.replace(hour=int(hh), minute=int(mm))
                                  if (now_jst - dt).total_seconds() <= 86400 * 1:
                                      recent += 1
                              except (ValueError, IndexError):
                                  continue
                          if recent == 0:
                              problems.append("X: 直近24hでposted 0件 — X自動投稿が停止している可能性")
                          else:
                              notes.append(f"X直近24h posted {recent}件")
          except Exception as exc:
              problems.append(f"X生存確認に失敗: {type(exc).__name__}")

          # 2.6-2.8) ローカルLaunchAgent監視のクラウド吸収 (Sheets読取のみ・read-only)
          #   2.6 IG ready滞留       (com.tackey.ig-freshness-check 相当)
          #   2.7 Threadsサイレント失敗 (com.taiki.threads-post-healthcheck 相当)
          #   2.8 note公開予定チェック  (com.tackey.note-publish-check 相当)
          #   列は各シートのヘッダー行から名前検出(列番号ハードコード禁止)。書き込みは一切しない。
          try:
              sa_path = "auth/service_account.json"
              if not (os.path.exists(sa_path) and os.path.getsize(sa_path) > 0):
                  notes.append("シート監視(IG/Threads/note): service accountなし→skip")
              else:
                  from google.auth.transport.requests import Request as _GARequest2
                  from google.oauth2 import service_account as _ga_sa2
                  _creds2 = _ga_sa2.Credentials.from_service_account_file(
                      sa_path, scopes=["https://www.googleapis.com/auth/spreadsheets.readonly"]
                  )
                  _creds2.refresh(_GARequest2())

                  def sheets_values(sheet_id, rng):
                      q = urllib.parse.quote(rng, safe="")
                      return get_json(
                          f"https://sheets.googleapis.com/v4/spreadsheets/{sheet_id}/values/{q}",
                          {"Authorization": f"Bearer {_creds2.token}"},
                      ).get("values", [])

                  jst = datetime.timezone(datetime.timedelta(hours=9))
                  now_jst = datetime.datetime.now(jst)
                  STALE_HOURS = 6  # 予定日時から何時間超過で滞留とみなすか

                  def find_col_exact(headers_rows, *names):
                      """ヘッダー行群から完全一致で列indexを返す(部分一致だと「制作ステータス」等を誤検出するため)"""
                      for hrow in headers_rows:
                          for idx, c in enumerate(hrow):
                              if str(c).strip() in names:
                                  return idx
                      return None

                  def cell2(row, idx):
                      return str(row[idx]).strip() if idx is not None and idx < len(row) else ""

                  def parse_sched(dv, tv):
                      """日付('2026-07-12'/'2026/7/12'/'7/12') + 時刻('20:00') → aware datetime(JST)。失敗はNone

                      注意: 投稿スケジュールは数週間先の未来日付が正常状態なので、
                      X生存確認の「過去日付前提の年跨ぎ補正」は使わない。年なし日付が
                      半年以上過去に見える場合のみ翌年扱い(12月に見る1月予定の補正)。"""
                      dv = dv.strip().replace("-", "/")
                      parts = dv.split("/")
                      try:
                          if len(parts) == 3 and len(parts[0]) == 4:
                              y, m, d = int(parts[0]), int(parts[1]), int(parts[2])
                          elif len(parts) == 2:
                              y, m, d = now_jst.year, int(parts[0]), int(parts[1])
                          else:
                              return None
                          dt = datetime.datetime(y, m, d, tzinfo=jst)
                          if len(parts) == 2 and (now_jst - dt).days > 180:
                              dt = dt.replace(year=now_jst.year + 1)  # 年跨ぎ補正(12月→翌1月予定)
                          tvs = tv.strip().replace("：", ":")
                          if ":" in tvs:
                              hh, mm = tvs.split(":")[:2]
                              dt = dt.replace(hour=int(hh), minute=int(mm))
                          return dt
                      except (ValueError, IndexError):
                          return None

                  # 2.6) IG ready滞留: 予定日時が6h以上過去なのに投稿ステータス=ready/retryのまま
                  try:
                      ig_sheet_id = "1xtEaMoZSWqrz7Z_fROS9QKgIHX3cydscVqLhQPckORg"
                      vals = sheets_values(ig_sheet_id, "'Instagram投稿毎データ'!A1:CZ500")
                      hrows, drows = vals[:3], vals[3:]  # ヘッダー行1-3 / データA4以降
                      c_status = find_col_exact(hrows, "投稿ステータス")
                      c_date = find_col_exact(hrows, "日付")
                      c_time = find_col_exact(hrows, "時刻", "時間")
                      c_num = find_col_exact(hrows, "番号")
                      if c_status is None or c_date is None:
                          problems.append("IG: 投稿ステータス/日付列をヘッダー行1-3から検出できず — 列名変更の可能性")
                      else:
                          stuck = []
                          for r in drows:
                              st = cell2(r, c_status).lower()
                              if st not in ("ready", "retry"):
                                  continue
                              sched = parse_sched(cell2(r, c_date), cell2(r, c_time))
                              if sched and (now_jst - sched).total_seconds() > 3600 * STALE_HOURS:
                                  stuck.append(cell2(r, c_num) or "?")
                          if stuck:
                              problems.append(
                                  f"IG: ready滞留{len(stuck)}件 (予定{STALE_HOURS}h+超過: "
                                  f"#{' #'.join(stuck[:5])}) — auto-post-all/CQ列を確認"
                              )
                          else:
                              notes.append("IG ready滞留なし")
                  except Exception as exc:
                      problems.append(f"IG ready滞留チェック失敗: {type(exc).__name__}")

                  # 2.7) Threadsサイレント失敗: 予定日時が6h以上過去なのにstatusが投稿完了になっていない
                  try:
                      th_sheet_id = "1hdBlZBn9s688f1ZwkTiO3suY27tJEHtXMEPkopLdBNI"
                      vals = sheets_values(th_sheet_id, "'Threads投稿毎データ'!A1:AZ500")
                      hrows, drows = vals[:3], vals[3:]
                      c_status = find_col_exact(hrows, "投稿ステータス")
                      c_date = find_col_exact(hrows, "日付")
                      c_time = find_col_exact(hrows, "時刻", "時間")
                      c_num = find_col_exact(hrows, "番号")
                      if c_status is None or c_date is None:
                          problems.append("Threads: 投稿ステータス/日付列をヘッダー行1-3から検出できず — 列名変更の可能性")
                      else:
                          stuck = []
                          for r in drows:
                              st = cell2(r, c_status).lower()
                              # 成功(published/posted)・意図的スキップ以外の未完了系のみ対象
                              if st not in ("ready", "retry"):
                                  continue
                              sched = parse_sched(cell2(r, c_date), cell2(r, c_time))
                              if sched and (now_jst - sched).total_seconds() > 3600 * STALE_HOURS:
                                  stuck.append(cell2(r, c_num) or "?")
                          if stuck:
                              problems.append(
                                  f"Threads: サイレント失敗疑い{len(stuck)}件 (予定{STALE_HOURS}h+超過でready/retry: "
                                  f"{' '.join(stuck[:5])}) — auto-post-all/AP列を確認"
                              )
                          else:
                              notes.append("Threads滞留なし")
                  except Exception as exc:
                      problems.append(f"Threadsサイレント失敗チェック失敗: {type(exc).__name__}")

                  # 2.8) note公開予定: 公開日時が過去(直近24h窓)なのに note URL が空 = 自動公開の失敗
                  #   実シートのステータス値は 執筆予定/執筆完了/公開済み/保留 で「公開予定」は
                  #   公開日+時間列で表現される。保留のみ対象外。古い行の恒久アラート化を防ぐため24h窓。
                  try:
                      note_sheet_id = "1gIW_SCigwa5wFPnQVRoFM3EhOaYC3aC_DtkMbqK8gRw"
                      vals = sheets_values(note_sheet_id, "'記事一覧'!A1:AC100")
                      hrows, drows = vals[:1], vals[1:]  # ヘッダー行1 / データ行2以降
                      c_status = find_col_exact(hrows, "ステータス")
                      c_date = find_col_exact(hrows, "公開日")
                      c_time = find_col_exact(hrows, "時間", "公開時刻")
                      c_url = find_col_exact(hrows, "note URL")
                      c_num = find_col_exact(hrows, "#")
                      if c_status is None or c_date is None or c_url is None:
                          problems.append("note: ステータス/公開日/note URL列を行1から検出できず — 列名変更の可能性")
                      else:
                          unpublished = []
                          published_recent = 0
                          for r in drows:
                              if not cell2(r, c_num):
                                  continue
                              if cell2(r, c_status) == "保留":
                                  continue
                              sched = parse_sched(cell2(r, c_date), cell2(r, c_time))
                              if not sched:
                                  continue
                              age = (now_jst - sched).total_seconds()
                              if 0 < age <= 86400:  # 直近24hに公開予定だった記事
                                  if cell2(r, c_url):
                                      published_recent += 1
                                  else:
                                      unpublished.append(cell2(r, c_num))
                          if unpublished:
                              problems.append(
                                  f"note: 公開予定なのに未公開{len(unpublished)}件 "
                                  f"(#{' #'.join(unpublished[:5])}) — note_api_publisher/LaunchAgentを確認"
                              )
                          else:
                              notes.append(f"note公開OK(24h内予定 公開済{published_recent}件)")
                  except Exception as exc:
                      problems.append(f"note公開予定チェック失敗: {type(exc).__name__}")
          except Exception as exc:
              problems.append(f"シート監視ブロック失敗: {type(exc).__name__}")

          # 2.9) ダッシュボード外形監視 (com.tackey.dashboard-healthcheck 相当・read-only)
          #   Basic認証はsecret(DASHBOARD_BASIC_AUTH="user:pass")経由。PUBLICリポに認証情報は置かない。
          #   secret未設定ならskip(問題化しない)。
          try:
              dash_auth = os.environ.get("DASHBOARD_BASIC_AUTH", "").strip()
              if not dash_auth:
                  notes.append("ダッシュボード外形: secret未設定→skip")
              else:
                  import base64
                  dash_url = "https://cellosupport.xsrv.jp/tackey-dashboard/api.php?action=sheets_2026"
                  basic = base64.b64encode(dash_auth.encode()).decode()
                  try:
                      dash = get_json(dash_url, {"Authorization": f"Basic {basic}"})
                      if "error" in dash:
                          problems.append(f"ダッシュボードAPIエラー: {str(dash['error'])[:80]}")
                      elif "total_posts" in dash:
                          notes.append("ダッシュボードOK")
                      else:
                          problems.append("ダッシュボード応答が想定外 (total_postsなし)")
                  except urllib.error.HTTPError as he:
                      problems.append(f"ダッシュボード非200: HTTP {he.code}")
          except Exception as exc:
              problems.append(f"ダッシュボード外形監視に失敗: {type(exc).__name__}")

          # 3) Cloud workflow freshness (latest success age)
          def latest_success_age_min(workflow_file):
              url = (
                  f"https://api.github.com/repos/{os.environ['REPO']}"
                  f"/actions/workflows/{workflow_file}/runs?status=success&per_page=1"
              )
              headers = {
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
              }
              runs = get_json(url, headers).get("workflow_runs", [])
              if not runs:
                  return None
              ts = datetime.datetime.strptime(runs[0]["updated_at"], "%Y-%m-%dT%H:%M:%SZ")
              ts = ts.replace(tzinfo=datetime.timezone.utc)
              return (datetime.datetime.now(datetime.timezone.utc) - ts).total_seconds() / 60

          # 投稿は auto-post-all.yml(90分間隔・IG/X/Threads統合)に一本化済。
          # 個別 auto-post-{instagram,threads,x}.yml は手動dispatch専用なので監視対象にしない
          # (schedule実行されず永遠にstale=誤アラートになるため)。
          for wf, label, limit_min in [
              ("auto-post-all.yml", "統合投稿(IG/X/Threads)", 200),
              ("sync-instagram-insights.yml", "IG同期", 720),
          ]:
              try:
                  age = latest_success_age_min(wf)
                  if age is None:
                      notes.append(f"{label}:実績なし")
                  elif age > limit_min:
                      problems.append(f"{label}: 最終success {age/60:.1f}h前 (許容 {limit_min/60:.1f}h)")
                  else:
                      notes.append(f"{label}OK({age:.0f}分前)")
              except Exception as exc:
                  problems.append(f"{label}の確認に失敗: {type(exc).__name__}")

          if os.environ.get("SIMULATE_FAILURE") == "yes":
              problems.append("(テスト) simulate_failure=yes による疑似アラート")

          lines = [f"❌ {p}" for p in problems] + [f"✅ {n}" for n in notes]
          print("\n".join(lines))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write("## Cloud Sentinel\n" + "\n".join(f"- {l}" for l in lines) + "\n")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write("problems=" + " / ".join(problems)[:800].replace("\n", " ") + "\n")
              fh.write("notes=" + " / ".join(notes)[:800].replace("\n", " ") + "\n")
          sys.exit(1 if problems else 0)
          PY

      # 自己修復: schedule休眠(課金ブロック復帰後など)や連続失敗で統合投稿workflowが古くなったら起こす。
      # 対象は実際の投稿元 auto-post-all.yml のみ(個別workflowを叩くと二重投稿になるため叩かない)。
      # 通常のready判定に任せるだけ(force指定なし)。顧客データ書き込みはしない。既存watchdogと同じ
      # scripts/dispatch_workflow_if_stale.py を再利用。workflow名は静的なので外部入力injectionリスクなし。
      - name: Self-heal stale unified post workflow
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          WORKFLOW_WATCH_FILE: auto-post-all.yml
          WORKFLOW_WATCH_STALE_MINUTES: '200'
          WORKFLOW_WATCH_FAILURE_RETRY_MINUTES: '200'
        run: python3 scripts/dispatch_workflow_if_stale.py || echo "self-heal returned non-zero (non-fatal)"

      # 朝夜の要点を必ずスマホへ(成功時も✅・失敗時は🚨高優先)。morning-brief/監視のクラウド代替。
      - name: Send digest to phone (ntfy)
        if: always()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PROBLEMS: ${{ steps.checks.outputs.problems }}
          NOTES: ${{ steps.checks.outputs.notes }}
          SCHEDULE: ${{ github.event.schedule }}
          OUTCOME: ${{ steps.checks.outcome }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          case "$SCHEDULE" in
            "0 23 * * *") TITLE="☀️ 朝の番人" ;;
            "0 11 * * *") TITLE="🌙 夜の番人" ;;
            *)            TITLE="🔍 Sentinel手動チェック" ;;
          esac
          if [ "$OUTCOME" = "success" ]; then
            curl -s -H "Title: $TITLE" -H "Tags: white_check_mark" \
              -d "✅ 全部OK / ${NOTES}" "https://ntfy.sh/${NTFY_TOPIC}" > /dev/null || true
          else
            curl -s -H "Title: $TITLE 🚨" -H "Priority: high" -H "Tags: rotating_light" \
              -d "🚨 ${PROBLEMS} / ✅ ${NOTES} / 詳細: GitHub Actions > Cloud Sentinel" \
              "https://ntfy.sh/${NTFY_TOPIC}" > /dev/null || true
          fi
