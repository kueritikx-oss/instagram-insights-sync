# 15分ごとにスプレッドシートをチェックし、投稿時間が来た投稿を自動でThreadsに投稿。
# GitHub Actionsの混雑しやすい */15 を避け、数分ずらしてschedule skipを減らす。
# MacBookがオフでもGitHub Actionsで自動実行される。
#
# Instagram自動投稿（auto-post-instagram.yml）と同アーキテクチャ。
# Threads API (graph.threads.net) を使用。
name: Auto Post Threads

on:
  # スケジュール実行は auto-post-all.yml (統合ワークフロー) に移行済み。
  # このファイルはThreads単体の緊急手動実行用として残す。
  workflow_dispatch:
    inputs:
      force_post:
        description: '強制投稿する投稿番号（T-001形式）'
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: threads-auto-post
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client requests

      - name: Run Threads auto-poster
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          FORCE_POST: ${{ inputs.force_post }}
          PYTHONUNBUFFERED: '1'
        run: |
          FORCE_ARG=""
          if [ -n "${FORCE_POST}" ]; then
            FORCE_ARG="--force ${FORCE_POST}"
          fi
          python cloud_auto_post_threads.py --window 45 ${FORCE_ARG}
        shell: bash

      - name: Alert on failure (Discord)
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py 2>/dev/null || true
