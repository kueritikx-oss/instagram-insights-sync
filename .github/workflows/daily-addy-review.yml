# 毎日のAddy考察レビュー
# 毎日 JST 22:30 (UTC 13:30・note分析22:00の後) に実行:
#   1. 当日1d/7dメトリクス確定の投稿を IG/Threads/X/note から収集
#   2. Addy(判断OS)に1往復でデイリーレビュー(学び+明日の1手+CSP影響+投稿別一言)
#   3. Discord embed配信 + 対応が確実な投稿の考察・仮説セル末尾に【Addy】一言を追記
# ADDNESS_API_KEY 未設定/Addy障害時は接続失敗の1行通知でdegrade(exit 0)。
name: Daily Addy Review

on:
  schedule:
    - cron: '30 13 * * *'  # UTC 13:30 → JST 22:30
  workflow_dispatch:
    inputs:
      date:
        description: '対象日 YYYY-MM-DD (空=今日JST。直近の確定日でのテスト用)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'dry-run (スプシ書き込みなし)'
        required: false
        default: false
        type: boolean
      no_notify:
        description: 'Discord送信を抑止'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: daily-addy-review
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily Addy review
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ADDNESS_API_KEY: ${{ secrets.ADDNESS_API_KEY }}  # 未設定でもdegrade動作で成功
          PYTHONUNBUFFERED: '1'
          INPUT_DATE: ${{ inputs.date }}          # 直接 run 内に展開しない(injection対策)
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_NO_NOTIFY: ${{ inputs.no_notify }}
        run: |
          set --
          if [ -n "$INPUT_DATE" ]; then
            if ! echo "$INPUT_DATE" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "❌ date は YYYY-MM-DD 形式で指定してください" >&2; exit 1
            fi
            set -- "$@" --date "$INPUT_DATE"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then set -- "$@" --dry-run; fi
          if [ "$INPUT_NO_NOTIFY" = "true" ]; then set -- "$@" --no-notify; fi
          echo "🤖 Addyデイリー考察レビューを実行中... flags:$*"
          python scripts/daily_addy_review.py "$@"

      - name: Alert on failure (Discord)
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py 2>/dev/null || true
