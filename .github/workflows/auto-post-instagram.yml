# 15分ごとにスプレッドシートをチェックし、投稿時間が来た投稿を自動でInstagramに投稿。
# MacBookがオフでもGitHub Actionsで自動実行される。
#
# 前提:
#   - 画像は事前にimgbbにアップロード済み（prepare_cloud_post.py でローカル実行）
#   - スプレッドシートのCR列に画像URL、CQ列にステータス "ready" が入っている
#   - N列にキャプション、A列に日付、D列に時刻が入っている
#
# 設計: Buffer/Later/Hootsuite と同等レベル
#   - Content Publishing Limit 事前チェック（Meta API準拠）
#   - コンテナステータスポーリング（指数バックオフ）
#   - リトライ3回 + Dead Letter（失敗をシートに記録）
#   - 15分ウィンドウ方式（GitHub Actions cron誤差±20分を吸収）
#   - 冪等性保証（media_id既存ならスキップ）
#   - 1日3投稿の自己制限
name: Auto Post Instagram

on:
  # スケジュール実行は auto-post-all.yml (統合ワークフロー) に移行済み。
  # このファイルはInstagram単体の緊急手動実行用として残す。
  workflow_dispatch:
    inputs:
      force_post:
        description: '強制投稿する投稿番号（スケジュール無視）'
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 同時実行を防ぐ（冪等性の追加保証）
    concurrency:
      group: instagram-auto-post
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Create auth dir and write credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p auth
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > auth/credentials.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > auth/token.json
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > auth/service_account.json
          fi
          sha256sum auth/token.json > /tmp/token_hash_before.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pynacl

      - name: Run auto-poster
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_FILE: auth/service_account.json
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          PYTHONUNBUFFERED: '1'
        run: |
          ARGS=""
          if [ -n "${{ inputs.force_post }}" ]; then
            ARGS="--force ${{ inputs.force_post }}"
          fi
          python cloud_auto_post.py --window 45 $ARGS

      - name: Auto-save refreshed Google Token
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -s auth/service_account.json ]; then
            echo "✅ Service Account mode. OAuth token auto-save skipped."
            exit 0
          fi
          if [ ! -f auth/token.json ]; then
            echo "⚠️ auth/token.json が存在しない。書き戻しスキップ。"
            exit 0
          fi
          sha256sum auth/token.json > /tmp/token_hash_after.txt
          if diff -q /tmp/token_hash_before.txt /tmp/token_hash_after.txt > /dev/null 2>&1; then
            echo "✅ Google Token 変更なし。スキップ。"
          else
            echo "🔄 Google Token が更新された。バリデーション→Secret書き戻し..."
            python scripts/save_google_token.py
          fi

      - name: Alert on failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py 2>/dev/null || true
