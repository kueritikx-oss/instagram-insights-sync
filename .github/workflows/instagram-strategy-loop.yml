# Instagram戦略ループ自動実行
# - 毎週月曜 JST 9:30（UTC 0:30）: weekly レビュー
# - 毎月1日 JST 10:00（UTC 1:00）: monthly 分析 + hooks フック銀行更新
# - 手動トリガー: 任意のモードを実行可能
name: Instagram Strategy Loop

on:
  schedule:
    # 毎週月曜 JST 9:30 = UTC 0:30
    - cron: '30 0 * * 1'
    # 毎月1日 JST 10:00 = UTC 1:00
    - cron: '0 1 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード (weekly / monthly / hooks / all)'
        required: false
        default: 'weekly'
        type: choice
        options:
          - weekly
          - monthly
          - hooks
          - all

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  strategy-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Create auth dir and write credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p auth
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > auth/credentials.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > auth/token.json
          # Service Account優先(失効しない)。鍵があればget_service()がSAで認証する
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > auth/service_account.json
          fi
          sha256sum auth/token.json > /tmp/token_hash_before.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pynacl

      - name: Determine execution mode
        id: mode
        run: |
          # workflow_dispatch の場合は入力値を使う
          if [ -n "${{ inputs.mode }}" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "📋 Manual trigger: mode=${{ inputs.mode }}"
          else
            # cron の場合: 曜日と日付で判定
            DAY_OF_MONTH=$(TZ=Asia/Tokyo date +%d)
            DAY_OF_WEEK=$(TZ=Asia/Tokyo date +%u)
            if [ "$DAY_OF_MONTH" = "01" ]; then
              # 毎月1日 → monthly + hooks
              echo "mode=monthly_and_hooks" >> $GITHUB_OUTPUT
              echo "📋 Monthly trigger (1st of month)"
            elif [ "$DAY_OF_WEEK" = "1" ]; then
              # 月曜 → weekly
              echo "mode=weekly" >> $GITHUB_OUTPUT
              echo "📋 Weekly trigger (Monday)"
            else
              echo "mode=skip" >> $GITHUB_OUTPUT
              echo "⏭️  No matching schedule, skipping"
            fi
          fi

      # ====== Weekly Review ======
      - name: Run weekly review
        if: >-
          steps.mode.outputs.mode == 'weekly' ||
          steps.mode.outputs.mode == 'all'
        env:
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          PYTHONUNBUFFERED: '1'
        run: |
          echo "📊 週次戦略レビューを実行中..."
          set -o pipefail
          python instagram_strategy_loop.py weekly 2>&1 | tee /tmp/sl_weekly.txt

      - name: Notify weekly summary (ntfy)
        if: >-
          success() &&
          (steps.mode.outputs.mode == 'weekly' || steps.mode.outputs.mode == 'all')
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          SUM=$(grep -E "TOP|保存|リーチ|来週|最強|組み合わせ|フック|🔥|💾|📊|🏆" /tmp/sl_weekly.txt 2>/dev/null | grep -vE "接続中|読み込み中" | tail -12 | head -c 1000)
          [ -z "$SUM" ] && SUM="週次レビュー完了"
          printf -v BODY '%s\n\n詳細はスプシ「戦略ループ_週次」タブ' "$SUM"
          curl -s -H "Title: 📊 週次SNSレポート" -H "Tags: bar_chart" \
            -d "$BODY" "https://ntfy.sh/${NTFY_TOPIC}" > /dev/null || true

      # ====== Monthly Analysis ======
      - name: Run monthly analysis
        if: >-
          steps.mode.outputs.mode == 'monthly' ||
          steps.mode.outputs.mode == 'monthly_and_hooks' ||
          steps.mode.outputs.mode == 'all'
        env:
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          PYTHONUNBUFFERED: '1'
        run: |
          echo "📈 月次戦略分析を実行中..."
          set -o pipefail
          python instagram_strategy_loop.py monthly 2>&1 | tee /tmp/sl_monthly.txt

      - name: Notify monthly summary (ntfy)
        if: >-
          success() &&
          (steps.mode.outputs.mode == 'monthly' || steps.mode.outputs.mode == 'monthly_and_hooks' || steps.mode.outputs.mode == 'all')
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          SUM=$(grep -E "リーチ|保存|フォロー|PV|ピラー|ベンチマーク|配分|📈|🏆|前月" /tmp/sl_monthly.txt 2>/dev/null | grep -vE "接続中|読み込み中" | tail -12 | head -c 1000)
          [ -z "$SUM" ] && SUM="月次分析完了"
          printf -v BODY '%s\n\n詳細はスプシ「戦略ループ_月次」タブ' "$SUM"
          curl -s -H "Title: 📅 月次SNSレポート" -H "Tags: calendar" \
            -d "$BODY" "https://ntfy.sh/${NTFY_TOPIC}" > /dev/null || true

      # ====== Hook Bank Update ======
      - name: Update hook bank
        if: >-
          steps.mode.outputs.mode == 'hooks' ||
          steps.mode.outputs.mode == 'monthly_and_hooks' ||
          steps.mode.outputs.mode == 'all'
        env:
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          PYTHONUNBUFFERED: '1'
        run: |
          echo "🎣 フック銀行を更新中..."
          python instagram_strategy_loop.py hooks --top 20

      # ====== Token write-back ======
      - name: Save Google token if changed
        if: always()
        env:
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          GH_PAT: ${{ secrets.GH_PAT }}
          PYTHONUNBUFFERED: '1'
        run: |
          sha256sum auth/token.json > /tmp/token_hash_after.txt
          if ! diff -q /tmp/token_hash_before.txt /tmp/token_hash_after.txt > /dev/null 2>&1; then
            echo "🔑 Token changed, saving to GitHub Secret..."
            python scripts/save_google_token.py
          else
            echo "✅ Token unchanged, skipping save"
          fi

      - name: Alert on failure (Discord)
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py 2>/dev/null || true
