# ファネル出口データ(成約CI/着金CJ)を CSP_売上マスター → 日ごとデータ へ日次転記。
# ローカル LaunchAgent com.tackey.funnel-outcomes-sync (毎日22:30 JST) のクラウド移植(2026-07-13・決定ログ追補143)。
# 毎日 JST 22:30 (UTC 13:30) 実行。年ブロック既存行のupdateのみ・append絶対禁止・既存値保護。
name: Sync Funnel Outcomes

on:
  schedule:
    - cron: '30 13 * * *'  # UTC 13:30 → JST 22:30
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set 'yes' to run without writing to the sheet"
        required: false
        default: 'no'
      backfill:
        description: "Backfill window in days (default 30, 0 = all)"
        required: false
        default: '30'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: funnel-outcomes-sync
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Sync funnel outcomes (CSP_売上マスター → 日ごとデータ CI/CJ)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'no' }}
          BACKFILL: ${{ github.event.inputs.backfill || '30' }}
          PYTHONUNBUFFERED: '1'
        run: |
          # 数値のみ許可(コマンドインジェクション対策)
          if ! [[ "$BACKFILL" =~ ^[0-9]+$ ]]; then
            BACKFILL=30
          fi
          if [ "$DRY_RUN" = "yes" ]; then
            python scripts/sync_funnel_outcomes_to_daily.py --backfill "$BACKFILL" --dry-run
          else
            python scripts/sync_funnel_outcomes_to_daily.py --backfill "$BACKFILL"
          fi

      - name: Alert on failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py 2>/dev/null || echo "Alert skipped"
