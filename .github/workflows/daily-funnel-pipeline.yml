# 日ごとデータ 日次ファネルパイプライン(段階aクラウド化・2026-07-13・決定ログ追補143)。
# ローカル run_daily_funnel_pipeline.sh (LaunchAgent com.tackey.lp-ab-tracking 毎日5:40 JST) のうち
# クラウド化対象step: LP共有シートPV(AM:AO) / LP_AB追跡(GA4) / 全セル監査(artifact+Discord)。
#
# ローカルに残るstep(このworkflowに入れない・二重書き込み禁止):
#   - フォーム/Lステップ由来(sync_daily_funnel_forms_from_drive等) = Harness切替(TASK-20260711-005/010)対象
#   - SNS集計/0埋め/書式/品質タブ(fill_daily_funnel_blanks等)
# 既にクラウド稼働済でここに入れないstep(sync-instagram-insights.yml JST3:00が担当):
#   - sync_ga4_daily.py(AM:AO GA4系) / sync_instagram_account_insights.py(E/F/G)
#
# 毎日 JST 05:40 (UTC 20:40) 実行。1step失敗でも後続継続、最後に失敗まとめ通知。
name: Daily Funnel Pipeline

on:
  schedule:
    - cron: '40 20 * * *'  # UTC 20:40 → JST 05:40 (現行ローカルLAと同刻)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set 'yes' to run syncs without writing to the sheet"
        required: false
        default: 'no'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: daily-funnel-pipeline
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # GA4のOAuth fallback用(SAがGA4プロパティ権限を持つ場合はSAが優先される)
      - name: Write GA4 token and config (fallback auth)
        env:
          GA4_TOKEN_JSON: ${{ secrets.GA4_TOKEN_JSON }}
          GA4_CONFIG_JSON: ${{ secrets.GA4_CONFIG_JSON }}
        run: |
          mkdir -p auth
          if [ -n "$GA4_TOKEN_JSON" ]; then
            printf '%s' "$GA4_TOKEN_JSON" > auth/ga4_token.json
          fi
          if [ -n "$GA4_CONFIG_JSON" ]; then
            printf '%s' "$GA4_CONFIG_JSON" > auth/ga4_config.json
          fi

      # ====== Step 1: LP共有シートPV → 日ごとデータ AM:AO ======
      - name: LP shared sheet PV sync
        id: lp_shared
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'no' }}
          PYTHONUNBUFFERED: '1'
        run: |
          if [ "$DRY_RUN" = "yes" ]; then
            python scripts/sync_lp_shared_sheet_to_daily.py --backfill 120 --dry-run
          else
            python scripts/sync_lp_shared_sheet_to_daily.py --backfill 120
          fi

      # ====== Step 2: LP_AB追跡_2026 (GA4 + 日ごとデータAP read) ======
      - name: LP_AB tracking sync
        id: lp_ab
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GA4_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          DRY_RUN: ${{ github.event.inputs.dry_run || 'no' }}
          PYTHONUNBUFFERED: '1'
        run: |
          if [ "$DRY_RUN" = "yes" ]; then
            python scripts/sync_lp_ab_tracking_daily.py --days 3 --dry-run
          else
            python scripts/sync_lp_ab_tracking_daily.py --days 3
          fi

      # ====== Step 3: 全セル監査 ======
      # ローカルwrapper(フォーム系のみ・同刻5:40起動)の書き込み完了を待ってから監査し、
      # 走行中の一時的空欄を誤検知しないようにする(Public repoのためrunner分は無料)。
      - name: Wait for local form sync window
        if: github.event_name == 'schedule'
        run: sleep 600

      - name: Daily all-cell audit
        id: audit
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PYTHONUNBUFFERED: '1'
        run: python scripts/audit_daily_data_cells.py --out-dir _tmp/daily_data_cell_audit_latest --lag-days 1 --fail-on-issue

      - name: Upload audit report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: daily-data-cell-audit
          path: _tmp/daily_data_cell_audit_latest/
          retention-days: 14
          if-no-files-found: ignore

      # ====== 失敗まとめ ======
      - name: Summarize step outcomes
        env:
          LP_SHARED_OUTCOME: ${{ steps.lp_shared.outcome }}
          LP_AB_OUTCOME: ${{ steps.lp_ab.outcome }}
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        run: |
          echo "LP shared sheet PV: $LP_SHARED_OUTCOME"
          echo "LP_AB tracking:     $LP_AB_OUTCOME"
          echo "All-cell audit:     $AUDIT_OUTCOME (failure=Issueセルあり or 実行エラー。Issue検知はaudit自身がDiscord warn済)"
          # 同期stepが失敗していたらworkflow自体をfailさせ、下のAlertに繋ぐ。
          # audit failureはIssue検知(exit 2)を含むため、同期失敗とは分けてここでは落とさない。
          if [ "$LP_SHARED_OUTCOME" != "success" ] || [ "$LP_AB_OUTCOME" != "success" ]; then
            exit 1
          fi

      - name: Alert on failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py 2>/dev/null || echo "Alert skipped"
