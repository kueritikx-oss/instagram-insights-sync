# データ鮮度チェック (Freshness SLO監視)
# 重要スプシの最新データが閾値超過で古ければ Discord に警告。
# sync ワークフローが死んでも独立して動くので二重防御になる。
name: Data Freshness Check

on:
  schedule:
    # JST 5:00, 9:00, 13:00, 17:00, 21:00 = UTC 20, 0, 4, 8, 12
    - cron: '0 0,4,8,12,20 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib requests

      - name: Run freshness check
        id: check
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GA4_TOKEN_JSON: ${{ secrets.GA4_TOKEN_JSON }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PYTHONUNBUFFERED: '1'
        run: python scripts/freshness_check.py

      - name: Healthcheck ping (success)
        if: success()
        env:
          HC_UUID: ${{ secrets.HC_FRESHNESS_UUID }}
        run: |
          if [ -n "$HC_UUID" ]; then
            curl -fsS -m 10 --retry 3 -o /dev/null "https://hc-ping.com/$HC_UUID"
          else
            echo "HC_FRESHNESS_UUID 未設定 → ping スキップ"
          fi

      - name: Healthcheck ping (failure)
        if: failure()
        env:
          HC_UUID: ${{ secrets.HC_FRESHNESS_UUID }}
        run: |
          if [ -n "$HC_UUID" ]; then
            curl -fsS -m 10 --retry 3 -o /dev/null "https://hc-ping.com/$HC_UUID/fail" || true
          fi

      - name: Alert on failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          HEALTHCHECK_UUID: ${{ secrets.HC_FRESHNESS_UUID }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py
