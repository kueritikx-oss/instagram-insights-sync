# X(Twitter) 最小PDCA基盤 — メトリクス同期 + 分析生成
# 毎日 JST 21:30 (UTC 12:30) に twikit で自分のタイムラインを取得し、
# 「X投稿毎データ」に 1日後/7日後の views/likes/RT/リプ を書き込み、
# 続けて結果①〜④・考察・次への示唆を自動生成する。
# Addy設計: IG98列のフルコピー禁止・最小メトリクスセットのみ。
name: Sync X Insights

on:
  schedule:
    - cron: '30 12 * * *'  # UTC 12:30 → JST 21:30
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: x-insights-sync
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install twikit google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client httpx

      - name: Sync X post metrics (1d / 7d)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          X_SPREADSHEET_ID: ${{ secrets.X_SPREADSHEET_ID }}
          PYTHONUNBUFFERED: '1'
        run: python sync_x_insights.py

      - name: Auto-save refreshed Twitter Cookies
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: pip install pynacl requests > /dev/null 2>&1 && python scripts/save_twitter_cookies.py || echo "Cookie書き戻し失敗 (non-fatal)"

      - name: Fill X post analysis
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          X_SPREADSHEET_ID: ${{ secrets.X_SPREADSHEET_ID }}
          PYTHONUNBUFFERED: '1'
        run: python fill_x_analysis.py

      - name: Alert on failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py 2>/dev/null || echo "Alert skipped"
