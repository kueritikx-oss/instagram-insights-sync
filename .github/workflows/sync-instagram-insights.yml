# 1日5回（JST 0:00, 3:00, 9:00, 15:00, 21:00）Instagram インサイトを取得しスプレッドシートに反映。
# JST 3:00（= UTC 18:00）にアカウントレベルインサイト（日次 + 月曜は週次デモグラフィック）を取得。
# 実行後に Google Token を自動で Secret に書き戻し、トークン期限切れを防止。
# 完了後にAuto Post Instagramを連鎖トリガー（cronバックアップ）。
name: Sync Instagram Insights

on:
  schedule:
    # JST 0:00=UTC15, 3:00=UTC18, 9:00=UTC0, 15:00=UTC6, 21:00=UTC12
    - cron: '0 0,6,12,15,18 * * *'
  workflow_dispatch:
    inputs:
      backfill_days:
        description: '日ごとデータE/F/G欠損を直近N日分バックフィル(0=無効)'
        required: false
        default: '14'
        type: string

permissions:
  actions: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Create auth dir and write credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          mkdir -p auth
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > auth/credentials.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > auth/token.json
          sha256sum auth/token.json > /tmp/token_hash_before.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pynacl

      # ====== 投稿レベルインサイト（毎回実行）======
      - name: Run media insights sync (v2.0)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          PYTHONUNBUFFERED: '1'
        run: python sync_instagram_insights.py

      - name: Auto-generate post analysis
        if: success()
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          PYTHONUNBUFFERED: '1'
        run: python fill_post_analysis.py --force

      # ====== アカウントレベルインサイト（JST 3:00 = UTC 18:00 のみ）======
      - name: Check if account insights should run (JST 3:00)
        id: check_account
        run: |
          HOUR_UTC=$(date -u +%H)
          DAY_OF_WEEK=$(TZ=Asia/Tokyo date +%u)
          echo "hour_utc=$HOUR_UTC" >> $GITHUB_OUTPUT
          echo "day_of_week=$DAY_OF_WEEK" >> $GITHUB_OUTPUT
          if [ "$HOUR_UTC" = "18" ]; then
            echo "run_account=true" >> $GITHUB_OUTPUT
            if [ "$DAY_OF_WEEK" = "1" ]; then
              echo "run_weekly=true" >> $GITHUB_OUTPUT
            else
              echo "run_weekly=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "run_account=false" >> $GITHUB_OUTPUT
            echo "run_weekly=false" >> $GITHUB_OUTPUT
          fi

      - name: Run account daily insights
        if: success() && (steps.check_account.outputs.run_account == 'true' || github.event_name == 'workflow_dispatch')
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '14' }}
          PYTHONUNBUFFERED: '1'
        # --backfill-days を常に有効にして、欠損があれば毎日自動補完
        run: |
          # 数値のみ許可（コマンドインジェクション対策）
          if ! [[ "$BACKFILL_DAYS" =~ ^[0-9]+$ ]]; then
            BACKFILL_DAYS=14
          fi
          python sync_instagram_account_insights.py --backfill-days "$BACKFILL_DAYS"

      - name: Run account weekly demographics (Monday only)
        if: success() && steps.check_account.outputs.run_weekly == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          PYTHONUNBUFFERED: '1'
        run: python sync_instagram_account_insights.py --weekly

      # ====== GA4 日次PV同期（JST 3:00 = UTC 18:00 のみ、account syncと同時）======
      - name: Write GA4 token and config
        if: success() && (steps.check_account.outputs.run_account == 'true' || github.event_name == 'workflow_dispatch')
        env:
          GA4_TOKEN_JSON: ${{ secrets.GA4_TOKEN_JSON }}
          GA4_CONFIG_JSON: ${{ secrets.GA4_CONFIG_JSON }}
        run: |
          if [ -z "$GA4_TOKEN_JSON" ] || [ -z "$GA4_CONFIG_JSON" ]; then
            echo "⚠️ GA4 secrets未設定。スキップ。"
          else
            printf '%s' "$GA4_TOKEN_JSON" > auth/ga4_token.json
            printf '%s' "$GA4_CONFIG_JSON" > auth/ga4_config.json
            echo "✅ GA4 auth files written"
          fi

      - name: Run GA4 daily PV sync
        if: success() && (steps.check_account.outputs.run_account == 'true' || github.event_name == 'workflow_dispatch')
        env:
          GA4_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          PYTHONUNBUFFERED: '1'
        run: |
          if [ -f auth/ga4_token.json ] && [ -f auth/ga4_config.json ]; then
            python sync_ga4_daily.py --days 2
          else
            echo "⚠️ GA4 auth未設定。スキップ。"
          fi

      # ====== 後処理 ======
      - name: Auto-save refreshed Google Token
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ ! -f auth/token.json ]; then
            echo "⚠️ auth/token.json が存在しない。書き戻しスキップ。"
            exit 0
          fi
          sha256sum auth/token.json > /tmp/token_hash_after.txt
          if diff -q /tmp/token_hash_before.txt /tmp/token_hash_after.txt > /dev/null 2>&1; then
            echo "✅ Google Token 変更なし。スキップ。"
          else
            echo "🔄 Google Token が更新された。バリデーション→Secret書き戻し..."
            python scripts/save_google_token.py
          fi

      - name: Trigger Auto Post check (redundant safety net)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: gh workflow run auto-post-instagram.yml --repo kueritikx-oss/instagram-insights-sync 2>/dev/null || echo "⚠️ Auto Post trigger skipped"

      # ====== Healthchecks.io Dead-man's switch ======
      - name: Healthcheck ping (success)
        if: success()
        env:
          HC_UUID: ${{ secrets.HC_SYNC_INSIGHTS_UUID }}
        run: |
          if [ -n "$HC_UUID" ]; then
            curl -fsS -m 10 --retry 3 -o /dev/null "https://hc-ping.com/$HC_UUID"
          else
            echo "HC_SYNC_INSIGHTS_UUID 未設定 → ping スキップ"
          fi

      - name: Healthcheck ping (failure)
        if: failure()
        env:
          HC_UUID: ${{ secrets.HC_SYNC_INSIGHTS_UUID }}
        run: |
          if [ -n "$HC_UUID" ]; then
            curl -fsS -m 10 --retry 3 -o /dev/null "https://hc-ping.com/$HC_UUID/fail" || true
          fi

      - name: Alert on failure (Discord + Issue + Healthcheck)
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          HEALTHCHECK_UUID: ${{ secrets.HC_SYNC_INSIGHTS_UUID }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py
