# 毎日 6:00 JST に Instagram インサイトを取得し、スプレッドシートに反映する。
# Mac がなくても実行される。
name: Sync Instagram Insights

on:
  schedule:
    # 6:00 JST = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create auth dir and write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          mkdir -p auth
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > auth/credentials.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > auth/token.json

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          PYTHONUNBUFFERED: '1'
        run: python sync_instagram_insights.py
