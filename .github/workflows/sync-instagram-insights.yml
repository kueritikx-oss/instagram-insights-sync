# 1日4回（JST 0:00, 6:00, 12:00, 18:00）Instagram インサイトを取得し、スプレッドシートに反映する。
# 実行後に Google Token を自動で Secret に書き戻し、トークン期限切れを防止する。
# セキュリティ: Actions は SHA pinning、Secret 書き戻しは success 時のみ、バリデーション付き。
name: Sync Instagram Insights

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Create auth dir and write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          mkdir -p auth
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > auth/credentials.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > auth/token.json
          sha256sum auth/token.json > /tmp/token_hash_before.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        id: sync
        env:
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          PYTHONUNBUFFERED: '1'
        run: python sync_instagram_insights.py

      # Google Token が更新されていたら Secret に書き戻す（成功時のみ）
      - name: Auto-save refreshed Google Token to Secret
        if: success()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ ! -f auth/token.json ]; then
            echo "⚠️ token.json が見つからない。スキップ。"
            exit 0
          fi
          sha256sum auth/token.json > /tmp/token_hash_after.txt
          if diff -q /tmp/token_hash_before.txt /tmp/token_hash_after.txt > /dev/null 2>&1; then
            echo "✅ Google Token 変更なし。スキップ。"
            exit 0
          fi
          echo "🔄 Google Token が更新された。バリデーション→Secret書き戻し..."
          pip install pynacl > /dev/null 2>&1
          python3 - <<'PYEOF'
import json, os, sys, base64, requests
from nacl import encoding, public
from google.oauth2.credentials import Credentials
from google.auth.transport.requests import Request

# --- Step 1: 新しいトークンが有効か検証 ---
with open("auth/token.json") as f:
    token_data = json.load(f)

if not token_data.get("refresh_token"):
    print("❌ refresh_token がない。書き戻しを中止。")
    sys.exit(0)

try:
    creds = Credentials(
        token=token_data.get("token"),
        refresh_token=token_data.get("refresh_token"),
        token_uri="https://oauth2.googleapis.com/token",
        client_id=token_data.get("client_id"),
        client_secret=token_data.get("client_secret"),
        scopes=["https://www.googleapis.com/auth/spreadsheets"],
    )
    if not creds.valid:
        creds.refresh(Request())
    # 軽量APIコールでバリデーション
    from googleapiclient.discovery import build
    service = build("sheets", "v4", credentials=creds)
    service.spreadsheets().get(spreadsheetId="1xtEaMoZSWqrz7Z_fROS9QKgIHX3cydscVqLhQPckORg",
                               fields="spreadsheetId").execute()
    print("✅ 新しいトークンのバリデーション成功")
    # バリデーション済みのトークンを保存用に更新
    validated_token = creds.to_json()
except Exception as e:
    print(f"❌ トークンバリデーション失敗: {e}")
    print("書き戻しを中止。元のSecretを保持。")
    sys.exit(0)

# --- Step 2: バリデーション済みトークンをSecretに書き戻す ---
gh_token = os.environ["GH_PAT"]
repo = "kueritikx-oss/instagram-insights-sync"
headers = {"Authorization": f"token {gh_token}", "Accept": "application/vnd.github.v3+json"}

r = requests.get(f"https://api.github.com/repos/{repo}/actions/secrets/public-key", headers=headers)
if r.status_code != 200:
    print(f"❌ GitHub API エラー: {r.status_code}")
    sys.exit(0)

key_data = r.json()
pub_key = public.PublicKey(key_data["key"].encode(), encoding.Base64Encoder())
sealed = public.SealedBox(pub_key)
encrypted = base64.b64encode(sealed.encrypt(validated_token.encode())).decode()

r = requests.put(
    f"https://api.github.com/repos/{repo}/actions/secrets/GOOGLE_TOKEN_JSON",
    headers=headers,
    json={"encrypted_value": encrypted, "key_id": key_data["key_id"]}
)
status = "✅" if r.status_code in (201, 204) else "❌"
print(f"{status} GOOGLE_TOKEN_JSON Secret 更新: {r.status_code}")
PYEOF

      # 失敗時にGitHub Issueでアラート
      - name: Alert on failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 -c "
import os, requests, json
from datetime import datetime, timezone
token = os.environ['GH_PAT']
repo = 'kueritikx-oss/instagram-insights-sync'
headers = {'Authorization': f'token {token}', 'Accept': 'application/vnd.github.v3+json'}

# 同じタイトルのopenなIssueがあればスキップ
r = requests.get(f'https://api.github.com/repos/{repo}/issues?state=open&labels=auto-alert', headers=headers)
existing = [i for i in r.json() if 'Sync Instagram Insights 失敗' in i.get('title', '')]
if existing:
    print('既存のアラートIssueあり。スキップ。')
else:
    now = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')
    requests.post(f'https://api.github.com/repos/{repo}/issues', headers=headers, json={
        'title': '🔴 Sync Instagram Insights 失敗',
        'body': f'## 発生日時\n{now}\n\n## 確認手順\n1. [Actions ログ](https://github.com/{repo}/actions) を確認\n2. Google Token: \`python3 utils/sync_secrets_to_github.py --check\`\n3. 修正後: \`python3 utils/sync_secrets_to_github.py\` で Secret 同期\n\n## よくある原因\n- Google refresh_token が無効（ローカルで再認証→Secret同期）\n- Instagram token 期限切れ（Meta Graph API Explorer で再発行）',
        'labels': ['auto-alert']
    })
    print('🚨 アラートIssue作成完了')
"
