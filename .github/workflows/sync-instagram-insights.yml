# 1日4回（JST 0:00, 6:00, 12:00, 18:00）Instagram インサイトを取得しスプレッドシートに反映。
# 実行後に Google Token を自動で Secret に書き戻し、トークン期限切れを防止。
name: Sync Instagram Insights

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Create auth dir and write credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          mkdir -p auth
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > auth/credentials.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > auth/token.json
          sha256sum auth/token.json > /tmp/token_hash_before.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pynacl

      - name: Run sync
        env:
          INSTAGRAM_INSIGHTS_GOOGLE_AUTH_DIR: ${{ github.workspace }}/auth
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_IG_USER_ID: ${{ secrets.INSTAGRAM_IG_USER_ID }}
          PYTHONUNBUFFERED: '1'
        run: python sync_instagram_insights.py

      - name: Auto-save refreshed Google Token
        if: success()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          sha256sum auth/token.json > /tmp/token_hash_after.txt
          if diff -q /tmp/token_hash_before.txt /tmp/token_hash_after.txt > /dev/null 2>&1; then
            echo "✅ Google Token 変更なし。スキップ。"
          else
            echo "🔄 Google Token が更新された。バリデーション→Secret書き戻し..."
            python scripts/save_google_token.py
          fi

      - name: Alert on failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py
