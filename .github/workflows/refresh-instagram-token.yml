# 週2回（月・木 JST 10:00）Instagram トークンの有効期限をチェック。
# 残り45日以内なら自動で60日延長し GitHub Secret を更新する。
# 75%ルール: 60日トークンの45日目で更新。週2回実行で障害窓を最小化。
name: Refresh Instagram Token

on:
  schedule:
    # 月・木 JST 10:00 = UTC 01:00
    - cron: '0 1 * * 1,4'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pynacl requests

      - name: Check and refresh token
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/refresh_instagram_token.py

      - name: Alert on failure (Discord + Issue)
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          HEALTHCHECK_UUID: ${{ secrets.HC_REFRESH_TOKEN_UUID }}
        run: pip install requests > /dev/null 2>&1 && python scripts/alert_on_failure.py
