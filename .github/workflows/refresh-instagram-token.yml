# 毎週月曜 JST 9:00 に Instagram トークンの有効期限をチェック。
# 残り30日以内なら自動で60日延長し、GitHub Secret を更新する。
# 残り7日以内の場合は GitHub Issue を作成してアラートする。
name: Refresh Instagram Token

on:
  schedule:
    # 毎週月曜 JST 9:00 = UTC 0:00
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check and refresh Instagram token
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install pynacl requests > /dev/null 2>&1
          python3 - <<'PYEOF'
import json, os, base64, sys
import requests as req
from datetime import datetime, timezone

token = os.environ["INSTAGRAM_ACCESS_TOKEN"]
app_id = os.environ["META_APP_ID"]
app_secret = os.environ["META_APP_SECRET"]
gh_pat = os.environ["GH_PAT"]
repo = "kueritikx-oss/instagram-insights-sync"

print("=" * 50)
print("🔍 Instagram トークン有効期限チェック")
print("=" * 50)

# 1. 現在のトークンの有効期限を確認
r = req.get("https://graph.facebook.com/v19.0/debug_token",
            params={"input_token": token, "access_token": token})
data = r.json().get("data", {})

is_valid = data.get("is_valid", False)
expires_at = data.get("expires_at", 0)

if not is_valid:
    print("❌ トークンは既に無効です。手動で再発行してください。")
    # GitHub Issue を作成
    headers = {"Authorization": f"token {gh_pat}", "Accept": "application/vnd.github.v3+json"}
    req.post(f"https://api.github.com/repos/{repo}/issues",
             headers=headers,
             json={"title": "🚨 Instagram トークンが無効です - 手動再発行が必要",
                   "body": "Instagram access token が無効になりました。\n\n"
                           "## 手順\n"
                           "1. [Meta Graph API Explorer](https://developers.facebook.com/tools/explorer/) を開く\n"
                           "2. App: 'Insights Auto Export' を選択\n"
                           "3. `instagram_content_publish` スコープにチェック\n"
                           "4. 'Generate Access Token' をクリック\n"
                           "5. ローカルの `instagram_insights_config.json` を更新\n"
                           "6. `python3 utils/sync_secrets_to_github.py` を実行\n",
                   "labels": ["urgent"]})
    sys.exit(1)

if expires_at:
    expiry = datetime.fromtimestamp(expires_at, tz=timezone.utc)
    now = datetime.now(timezone.utc)
    days_left = (expiry - now).total_seconds() / 86400
    print(f"📅 有効期限: {expiry.strftime('%Y-%m-%d')} (残り {days_left:.0f} 日)")
else:
    print("✅ 無期限トークン。更新不要。")
    sys.exit(0)

# 2. 残り30日以内なら自動延長
if days_left > 30:
    print(f"✅ 残り {days_left:.0f} 日。更新不要。")
    sys.exit(0)

print(f"\n⚠️ 残り {days_left:.0f} 日。自動延長を実行...")

# Long-lived token を新しい Long-lived token に交換
r = req.get("https://graph.facebook.com/v19.0/oauth/access_token",
            params={"grant_type": "fb_exchange_token",
                    "client_id": app_id,
                    "client_secret": app_secret,
                    "fb_exchange_token": token})
result = r.json()

if "access_token" not in result:
    print(f"❌ トークン延長失敗: {result}")
    # 残り7日以内なら Issue 作成
    if days_left < 7:
        headers = {"Authorization": f"token {gh_pat}", "Accept": "application/vnd.github.v3+json"}
        req.post(f"https://api.github.com/repos/{repo}/issues",
                 headers=headers,
                 json={"title": f"🔴 Instagram トークン残り {days_left:.0f} 日 - 自動延長失敗",
                       "body": f"自動延長が失敗しました。手動で再発行してください。\n\nエラー: {result}"})
    sys.exit(1)

new_token = result["access_token"]
new_expires = result.get("expires_in", 0)
print(f"✅ 新しいトークン取得成功（有効期間: {new_expires // 86400} 日）")

# 3. GitHub Secret を更新
from nacl import encoding, public

headers = {"Authorization": f"token {gh_pat}", "Accept": "application/vnd.github.v3+json"}
r = req.get(f"https://api.github.com/repos/{repo}/actions/secrets/public-key", headers=headers)
key_data = r.json()
pub_key = public.PublicKey(key_data["key"].encode(), encoding.Base64Encoder())

sealed = public.SealedBox(pub_key)
encrypted = base64.b64encode(sealed.encrypt(new_token.encode())).decode()

r = req.put(f"https://api.github.com/repos/{repo}/actions/secrets/INSTAGRAM_ACCESS_TOKEN",
            headers=headers,
            json={"encrypted_value": encrypted, "key_id": key_data["key_id"]})

if r.status_code in (201, 204):
    print("✅ INSTAGRAM_ACCESS_TOKEN Secret 更新完了")
else:
    print(f"❌ Secret 更新失敗: {r.status_code}")
    sys.exit(1)

# 4. 新しいトークンの有効期限を確認
r2 = req.get("https://graph.facebook.com/v19.0/debug_token",
             params={"input_token": new_token, "access_token": new_token})
new_data = r2.json().get("data", {})
new_exp = new_data.get("expires_at", 0)
if new_exp:
    new_expiry = datetime.fromtimestamp(new_exp, tz=timezone.utc)
    print(f"📅 新しい有効期限: {new_expiry.strftime('%Y-%m-%d')}")

print("\n🎉 Instagram トークン自動延長完了！")
PYEOF
