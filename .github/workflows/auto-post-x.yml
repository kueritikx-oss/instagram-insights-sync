# X自動投稿 (twikit版) — 公式APIの従量課金なしで投稿
# twikit (X内部GraphQL API) + セッションCookie認証
# 15分ごとにスプシチェック → 投稿時間が来たらツイート
name: Auto Post X

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force_post:
        description: '強制投稿する投稿番号（X-001形式）'
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: x-auto-post
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install twikit google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client httpx

      - name: Run X auto-poster (twikit)
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          X_SPREADSHEET_ID: ${{ secrets.X_SPREADSHEET_ID }}
          FORCE_POST_NUM: ${{ inputs.force_post }}
          PYTHONUNBUFFERED: '1'
        run: |
          FORCE_ARG=""
          if [ -n "${FORCE_POST_NUM}" ]; then
            FORCE_ARG="--force ${FORCE_POST_NUM}"
          fi
          python cloud_auto_post_x.py --window 45 ${FORCE_ARG}
        shell: bash
